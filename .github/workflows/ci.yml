name: Edge BitNet Engine CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake

      - name: Configure CMake
        run: |
          cd edge-quantized-bitnet
          mkdir build
          cd build
          cmake ..

      - name: Compile target binaries
        run: |
          cd edge-quantized-bitnet/build
          make

      - name: Execute sanity tests
        run: |
          cd edge-quantized-bitnet/build
          ./bitnet_engine
